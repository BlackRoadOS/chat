<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackRoad Chat — Free AI</title>
<link rel="icon" type="image/png" sizes="32x32" href="https://images.blackroad.io/brand/br-square-32.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--card:#0a0a0a;--border:#1a1a1a;--text:#f5f5f5;--sub:#737373;--muted:#444;--g:linear-gradient(90deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF)}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;flex-direction:column}
.header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:700;font-size:15px}
.logo-bar{height:3px;width:20px;background:var(--g);border-radius:2px;display:inline-block;margin-right:8px;vertical-align:middle}
.status{font-family:'JetBrains Mono';font-size:10px;color:var(--sub);display:flex;align-items:center;gap:6px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#00D4FF;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:700px;width:100%}
.msg.user{align-self:flex-end}
.msg.ai{align-self:flex-start}
.msg-content{padding:12px 16px;border-radius:10px;font-size:14px;line-height:1.7}
.msg.user .msg-content{background:var(--card);border:1px solid var(--border)}
.msg.ai .msg-content{background:transparent;border:1px solid var(--border)}
.msg-meta{font-family:'JetBrains Mono';font-size:9px;color:var(--muted);margin-top:4px;padding:0 4px}
.input-area{padding:16px 20px;border-top:1px solid var(--border);background:var(--card)}
.input-row{display:flex;gap:10px;max-width:700px;margin:0 auto;width:100%}
.input-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'Space Grotesk';font-size:14px;outline:none}
.input-row input:focus{border-color:#444}
.input-row input::placeholder{color:var(--muted)}
.send-btn{background:var(--text);color:#000;border:none;border-radius:8px;padding:12px 20px;font-weight:600;font-size:13px;cursor:pointer;font-family:'Space Grotesk'}
.send-btn:hover{background:#ddd}
.send-btn:disabled{background:var(--muted);cursor:not-allowed}
.welcome{text-align:center;padding:60px 20px;max-width:500px;margin:0 auto}
.welcome h2{font-size:24px;margin-bottom:12px}
.welcome p{color:var(--sub);line-height:1.7;font-size:14px}
.welcome .grad-bar{height:3px;width:60px;background:var(--g);border-radius:2px;margin:20px auto}
.model-tag{font-family:'JetBrains Mono';font-size:9px;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:2px 6px;border-radius:3px;display:inline-block;margin-top:6px}
.typing{display:flex;gap:4px;padding:8px 0}
.typing span{width:6px;height:6px;background:var(--sub);border-radius:50%;animation:typingDot 1s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes typingDot{0%,100%{opacity:0.3}50%{opacity:1}}
.footer{text-align:center;padding:8px;font-size:9px;color:var(--muted);font-family:'JetBrains Mono'}
</style>
  <script src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
</head>
<body>
<div class="header">
  <div class="logo"><span class="logo-bar"></span>BlackRoad Chat</div>
  <div class="status"><span class="status-dot"></span><span id="status-text">5 nodes online · 44 models</span></div>
</div>
<div class="input-area">
  <input type="text" id="messageInput" placeholder="Type a message..." />

  <!-- NEW BUTTON -->
  <button id="emojiBtn">😊</button>

  <button id="sendBtn">Send</button>
</div>

<!-- Emoji Picker Container -->
<div id="emojiPicker" style="display:none;"></div>
<div class="messages" id="messages">
  <div class="welcome">
    <h2>BlackRoad Chat</h2>
    <div class="grad-bar"></div>
    <p>Free AI chat powered by 5 Raspberry Pi nodes running 44 local models. Your data stays on our hardware. No API keys. No cloud. Sovereign inference.</p>
  </div>
</div>

<div class="input-area">
  <form class="input-row" id="chat-form">
    <input type="text" id="chat-input" placeholder="Ask anything..." autocomplete="off" autofocus>
    <button type="submit" class="send-btn" id="send-btn">Send</button>
  </form>
</div>
<div class="footer">Powered by Ollama on BlackRoad fleet · 52 TOPS · Pave Tomorrow</div>

<script>
const OLLAMA_URL = 'https://prism.blackroad.io'; // proxy through prism
const messages = document.getElementById('messages');
const input = document.getElementById('chat-input');
const form = document.getElementById('chat-form');
const sendBtn = document.getElementById('send-btn');

  document.addEventListener("DOMContentLoaded", () => {
  const emojiBtn = document.getElementById("emojiBtn");
  const emojiPickerContainer = document.getElementById("emojiPicker");
  const input = document.getElementById("messageInput");

  // create emoji picker
  const picker = document.createElement("emoji-picker");
  emojiPickerContainer.appendChild(picker);

  // toggle picker
  emojiBtn.addEventListener("click", () => {
    emojiPickerContainer.style.display =
      emojiPickerContainer.style.display === "none" ? "block" : "none";
  });

  // when emoji selected
  picker.addEventListener("emoji-click", (event) => {
    input.value += event.detail.unicode;
  });
});
let history = [];

// Fetch fleet status
fetch('https://prism.blackroad.io/api/kpis').then(r => r.json()).then(d => {
  document.getElementById('status-text').textContent = `${d.fleet} nodes · ${d.models} models`;
}).catch(() => {});

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  div.innerHTML = `
    <div class="msg-content">${content.replace(/\n/g, '<br>')}</div>
    <div class="msg-meta">${role === 'user' ? 'You' : 'BlackRoad AI'} · ${time}</div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  div.innerHTML = '<div class="msg-content"><div class="typing"><span></span><span></span><span></span></div></div>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  sendBtn.disabled = true;

  // Remove welcome
  const welcome = messages.querySelector('.welcome');
  if (welcome) welcome.remove();

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  const typing = addTyping();

  try {
    // Try Prism's LLM endpoint first
    const resp = await fetch('https://prism.blackroad.io/api/lucidia/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history.slice(-10) }),
    });

    typing.remove();

    if (resp.ok) {
      const data = await resp.json();
      const reply = data.content || data.message || data.reply || JSON.stringify(data);
      addMessage('ai', reply);
      history.push({ role: 'assistant', content: reply });
    } else {
      // Fallback: direct Ollama on Cecilia via stats proxy
      const ollamaResp = await fetch('https://stats-blackroad.amundsonalexa.workers.dev/ollama/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'mistral',
          prompt: text,
          stream: false,
        }),
      });

      if (ollamaResp.ok) {
        const ollamaData = await ollamaResp.json();
        const reply = ollamaData.response || 'No response from model.';
        addMessage('ai', reply);
        history.push({ role: 'assistant', content: reply });
      } else {
        addMessage('ai', 'Fleet is busy. All 5 nodes are online but inference queue is full. Try again in a moment.');
      }
    }
  } catch (err) {
    typing.remove();
    addMessage('ai', `Connection issue: ${err.message}. Fleet status: check prism.blackroad.io/api/health`);
  }

  sendBtn.disabled = false;
  input.focus();
});
</script>
</body>
</html>
